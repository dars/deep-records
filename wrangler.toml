name = "keeper"
main = "worker/keeper.ts"
compatibility_date = "2025-12-01"

rules = [
  { type = "Text", globs = ["**/*.md"], fallthrough = true }
]

# 前端靜態檔與 API 由同一個 worker 服務：/api/* 與 /health 走 worker，
# 其餘路徑由 dist/ 靜態資產回應（SPA fallback 到 index.html）。
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health", "/admin"]

[observability]
enabled = true

# 每個來源 IP 每 60 秒最多 20 次 keeper 回合請求。
[[ratelimits]]
name = "KEEPER_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }

# 語音合成獨立限流：每 IP 每 60 秒 10 次。
[[ratelimits]]
name = "TTS_RATE_LIMITER"
namespace_id = "1002"
simple = { limit = 10, period = 60 }

# TTS 音訊快取（Cache API 在 workers.dev 無效，改用 KV）。
[[kv_namespaces]]
binding = "TTS_CACHE"
id = "aacd0ed8e4e94e84ae45882ba1419b84"

# 遊玩事件記錄（匿名 session、回合層級）。
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "deep-records-analytics"
database_id = "255353e6-6fa1-4755-8846-6eba19949747"

[vars]
# ElevenLabs 語音與模型；換聲音／模型改這裡即可。
ELEVENLABS_VOICE_ID = "kbrsaic1zriFXx1pgRYN"
ELEVENLABS_MODEL_ID = "eleven_v3"
