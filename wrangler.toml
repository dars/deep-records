name = "keeper"
main = "worker/keeper.ts"
compatibility_date = "2025-12-01"

rules = [
  { type = "Text", globs = ["**/*.md"], fallthrough = true }
]

# 前端靜態檔與 API 由同一個 worker 服務：/api/* 與 /health 走 worker，
# 其餘路徑由 dist/ 靜態資產回應（SPA fallback 到 index.html）。
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/health"]

[observability]
enabled = true

# 每個來源 IP 每 60 秒最多 20 次 keeper 回合請求。
[[ratelimits]]
name = "KEEPER_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
